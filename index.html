// 기업 AI 투자 결정 (자동)
function companyAIDecide(stockId, cd, stock, day) {
  const ceo=CEOS.find(c=>c.id===cd.ceoId)||CEOS[0];
  const capitalRatio=cd.capital/stock.maxCapital;
  const decisions=[];

  // 자본금 풍부할 때 공격적 투자
  if(capitalRatio>0.4){
    // R&D 자동 시작 (진행중 없을 때)
    const activeRd=cd.rdActive.filter(r=>r.status==="active"||r.status==="extended");
    if(activeRd.length<2){
      const available=stock.rdProjects.filter(p=>!cd.rdActive.some(r=>r.name===p.name&&(r.status==="active"||r.status==="extended")));
      if(available.length>0&&Math.random()<(ceo.tier==="천재"?0.4:ceo.tier==="유능"?0.25:ceo.tier==="무능"?0.08:0.15)){
        const proj=ceo.tier==="무능"?available[Math.floor(Math.random()*available.length)]:available[0];
        if(cd.capital>=proj.cost){
          decisions.push({type:"rd",proj});
        }
      }
    }
    // 설비투자 (효율 낮을 때)
    if(cd.facility<60&&Math.random()<(ceo.tier==="천재"?0.3:ceo.tier==="무능"?0.05:0.15)){
      const cost=Math.floor(stock.maxCapital*0.08);
      if(cd.capital>=cost) decisions.push({type:"facility",cost});
    }
    // 신규 시장 진출
    if(!cd.newCatDev&&capitalRatio>0.6&&Math.random()<(ceo.tier==="천재"?0.12:ceo.tier==="유능"?0.06:0.02)){
      const unexplored=INDUSTRY_CATS.filter(cat=>!cd.productStats[cat.id]);
      if(unexplored.length>0){
        const cost=Math.floor(stock.maxCapital*0.15);
        if(cd.capital>=cost) decisions.push({type:"newcat",cat:unexplored[0]});
      }
    }
  }
  // 무능 CEO: 가끔 자본금 낭비
  if(ceo.tier==="무능"&&Math.random()<0.1){
    decisions.push({type:"waste",amount:Math.floor(cd.capital*0.05)});
  }
  return decisions;
}

// 가격 점수 계산 (베블런 효과 지원)
function calcPriceScore(price, allPrices, veblen=false) {
  if(allPrices.every(p=>p===0)) return 80;
  const maxP = Math.max(...allPrices.filter(p=>p>0));
  if(price===0) return 80;
  if(veblen) return Math.round((price/maxP)*60+30); // 비쌀수록 높은 점수
  return Math.round((1-price/maxP)*60+30);
}

function calcProductScore(prod, cat, allProds) {
  const allPrices=allProds.map(p=>p.price);
  const priceScore=calcPriceScore(prod.price,allPrices,cat.veblen||false);
  const w=cat.weights;
  return Math.round((prod.tech*w.tech+priceScore*w.price+prod.ad*w.ad+prod.brand*w.brand)/100);
}

function calcMarketShare(cat, allProds) {
  const scores=allProds.map(p=>calcProductScore(p,cat,allProds));
  const total=scores.reduce((a,b)=>a+b,0)||1;
  return scores.map(s=>Math.round(s/total*100));
}

// 호가창 생성
function genOrderBook(price) {
  const levels = 5;
  const sells = [], buys = [];
  for(let i=levels;i>=1;i--){
    const spread = price * 0.002 * i;
    const askPrice = Math.round(price + spread);
    const vol = Math.floor(Math.random()*800+200)*100;
    sells.push({price:askPrice, vol});
  }
  for(let i=1;i<=levels;i++){
    const spread = price * 0.002 * i;
    const bidPrice = Math.round(price - spread);
    const vol = Math.floor(Math.random()*800+200)*100;
    buys.push({price:bidPrice, vol});
  }
  return {sells, buys};
}

function MiniChart({hist,w=180}){
  if(!hist||hist.length<2)return null;
  const max=Math.max(...hist),min=Math.min(...hist),rng=max-min||1;
  const h=30;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*w},${h-((v-min)/rng)*h}`).join(" ");
  const last=hist[hist.length-1],prev=hist[hist.length-2];
  return<svg width={w} height={h} style={{display:"block",marginTop:4}}><polyline fill="none" stroke={last>=prev?"#4ade80":"#f87171"} strokeWidth="1.5" points={pts}/></svg>;
}

    return Math.min(100,Math.max(0,gdp+avg*30+(Math.random()-0.5)*3));
  },[gdp]);

  useEffect(()=>{
    const cur=ta();
    const g={ta:cur,edu,props:ownedProps.length,buys,lottoW,delistC,jailC};
    ACHS.forEach(a=>{
      if(!achiev.includes(a.id)&&a.cond(g)){
        setAchiev(p=>[...p,a.id]);
        notify(`🏆 업적: ${a.emoji}${a.name}!`,"i");
        addLog(`🏆 업적 달성: ${a.name}`);
      }
    });
    if(cur>=1000000000)setTitle("👑 재벌");
    else if(cur>=100000000)setTitle("💎 억만장자");
    else if(cur>=10000000)setTitle("🏆 부자");
    else if(cur>=1000000)setTitle("💰 백만장자");
    else if(cur>=100000)setTitle("📈 투자자");
    else setTitle("🌱 새싹");
  },[money,ownedProps.length,edu,buys,lottoW,delistC,jailC]);

  const getQty=(id)=>{
    const mode=qtyMode[id];
    if(mode==="10")return 10;
    if(mode==="100")return 100;
    if(mode==="1000")return 1000;
    if(mode==="all")return Math.max(1,Math.floor(money/(prices[id]||1)));
    return parseInt(qty[id]||1);
  };

  const nextDay=()=>{
    if(jailDays>0){
      setJailDays(p=>p-1);
      setDay(d=>d+1);
      setMonth(m=>m===12?1:m+1);
      addLog(`🔒 감옥 수감 중... (${jailDays-1}일 남음)`);
      notify(`🔒 감옥 ${jailDays-1}일 남음`,"b");
      return;
    }

    const nd=day+1;setDay(nd);
    const nm=month===12?1:month+1;setMonth(nm);
    setPrevMoney(money);setPrevTA(ta());

    // News
    let ne=null,neMsg="";
    if(Math.random()<0.38){
      const n=NEWS[Math.floor(Math.random()*NEWS.length)];
      setNewsToday(n);ne=n.e;neMsg=n.msg;
    } else setNewsToday(null);

    // Update prices
    const newPrices={};
    STOCKS.forEach(s=>{
      if(delisted.includes(s.id)){newPrices[s.id]=prices[s.id];return;}
      let ch=(Math.random()-0.46)*0.1+inflation*0.001;
      if(ne){
        if(ne.type==="all")ch+=(ne.m-1);
        if(ne.type==="sector"&&s.type===ne.sector)ch+=(ne.m-1);
        if(ne.type==="war"&&s.type==="defense")ch+=0.22;
        if(ne.type==="war"&&s.type!=="defense")ch-=0.1;
      }
      if(gdp<25)ch-=0.025;
      if(gdp>75)ch+=0.02;
      if(insiderS===s.id)ch=Math.abs(ch)+0.06;
      ch=Math.max(-0.3,Math.min(0.3,ch));
      newPrices[s.id]=Math.max(10,Math.round(prices[s.id]*(1+ch)));
    });
    COINS.forEach(c=>{
      let ch=(Math.random()-0.44)*c.vol*0.15;
      if(ne?.type==="coin")ch+=(ne.m-1);
      ch=Math.max(-0.4,Math.min(0.4,ch));
      newPrices[c.id]=Math.max(1,Math.round(prices[c.id]*(1+ch)));
    });
    setPrevPrices({...prices});
    setPrices(newPrices);
    // Update order books
    setOrderBooks(prev=>{
      const next={...prev};
      STOCKS.forEach(s=>{if(!delisted.includes(s.id))next[s.id]=genOrderBook(newPrices[s.id]||s.initP);});
      return next;
    });

    setHist(prev=>{
      const next={...prev};
      [...STOCKS,...COINS].forEach(s=>{next[s.id]=[...(prev[s.id]||[]).slice(-29),prices[s.id]];});
      return next;
    });

    // Delisting
    STOCKS.forEach(s=>{
      if(!delisted.includes(s.id)&&prices[s.id]<50&&Math.random()<0.35){
        setDelisted(p=>[...p,s.id]);
        setDelistC(p=>p+1);
        addLog(`💀 ${s.name} 상장폐지!`);
        notify(`💀 ${s.name} 상장폐지!`,"b");
        setPort(p=>({...p,[s.id]:0}));
      }
    });

    // Dividend payout
    STOCKS.filter(s=>s.dividend).forEach(s=>{
      if(nm===s.dividend.month&&(port[s.id]||0)>0){
        const div=Math.round(prices[s.id]*s.dividend.rate*(port[s.id]||0));
        setMoney(m=>m+div);
        addLog(`💸 ${s.name} 배당금 +${fmt(div)}원`);
        notify(`💸 ${s.name} 배당 +${fmt(div)}원!`,"i");
      }
    });

    // Income
    let rent=0;ownedProps.forEach(pid=>{const p=PROPS.find(x=>x.id===pid);if(p)rent+=p.rent;});
    let income=0;
    if(basicJob){const j=BASIC_JOBS.find(x=>x.id===basicJob);if(j)income+=j.pay;}
    if(companyId&&positionId){
      const pos=COMPANY_POSITIONS.find(x=>x.id===positionId);
      const base=companyId==="삼전"?1500:companyId==="네이버"?1300:companyId==="카카오"?1100:companyId==="KT"?900:companyId==="한국전력"?800:companyId==="한화에어"?1600:companyId==="LIG넥스"?1200:companyId==="뿌셔바이오"?600:500;
      if(pos)income+=Math.round(base*pos.payMult);
    }
    const gross=rent+income;
    const taxRate=gross>1000?0.22:gross>500?0.12:0.05;
    const tax=Math.floor(gross*taxRate);
    setTaxTotal(p=>p+tax);
    const net=gross-tax;

    // Loan repayment
    if(loan>0){
      const rep=Math.min(loan,Math.floor(net*0.3)+100);
      setLoan(p=>Math.max(0,p-rep));
    }

    // GDP update based on major stock prices
    setGdp(calcGDP(newPrices,prices));
    setInflation(p=>Math.min(20,Math.max(-2,p+(Math.random()-0.5)*0.5)));

    // Company simulation: 완전 자동 AI (CEO 기반)
    const ceoEvents=[];
    setCompanyData(prev=>{
      const next=JSON.parse(JSON.stringify(prev));
      STOCKS.forEach(s=>{
        const cd=next[s.id];
        const ceo=CEOS.find(c=>c.id===cd.ceoId)||CEOS[0];

        // CEO 임기 관리
        cd.ceoTenure=(cd.ceoTenure||0)+1;
        if(cd.ceoTenure>=CEO_TENURE){
          const roll=Math.random();
          let newCeo;
          if(roll<0.08) newCeo=CEOS.filter(c=>c.tier==="천재")[Math.floor(Math.random()*3)];
          else if(roll<0.3) newCeo=CEOS.filter(c=>c.tier==="유능")[Math.floor(Math.random()*3)];
          else if(roll<0.5) newCeo=CEOS.filter(c=>c.tier==="무능")[Math.floor(Math.random()*3)];
          else newCeo=CEOS.filter(c=>c.tier==="평범")[Math.floor(Math.random()*3)];
          cd.ceoId=newCeo.id;cd.ceoTenure=0;
          ceoEvents.push({stock:s,ceo:newCeo});
        }

        // CEO 스캔들
        if(Math.random()*100<ceo.scandalRate*0.05){
          ceoEvents.push({stock:s,ceo,scandal:true});
        }

        // 자본금 증가 (영업이익 + CEO 배수)
        const totalShare=INDUSTRY_CATS.reduce((a,cat)=>{
          const idx=cat.products.findIndex(p=>p.company===s.id);
          if(idx<0)return a;
          const shares=calcMarketShare(cat,cat.products);
          return a+shares[idx]/cat.products.length;
        },0);
        const dailyProfit=Math.floor(s.profit/365*(1+totalShare/100)*ceo.capitalMult);
        if(dailyProfit>0)cd.capital=Math.min(s.maxCapital,cd.capital+dailyProfit);

        // 설비 노후화
        cd.facilityAge=(cd.facilityAge||0)+1;
        if(cd.facilityAge%30===0&&cd.facility>30)cd.facility=Math.max(30,cd.facility-2);

        // AI 투자 결정
        const decisions=companyAIDecide(s.id,cd,s,nd);
        decisions.forEach(dec=>{
          if(dec.type==="rd"){
            cd.rdActive.push({...dec.proj,daysLeft:dec.proj.days,totalDays:dec.proj.days,status:"active"});
            cd.capital-=dec.proj.cost;
          } else if(dec.type==="facility"){
            cd.facility=Math.min(100,cd.facility+12);cd.capital-=dec.cost;
          } else if(dec.type==="newcat"){
            const cost=Math.floor(s.maxCapital*0.15);
            cd.newCatDev={catId:dec.cat.id,daysLeft:ceo.tier==="천재"?8:15};cd.capital-=cost;
          } else if(dec.type==="waste"){
            cd.capital=Math.max(0,cd.capital-dec.amount);
          }
        });

        // R&D 진행
        cd.rdActive=cd.rdActive.map(rd=>{
          if(rd.status!=="active"&&rd.status!=="extended")return rd;
          const newDays=rd.daysLeft-1;
          if(newDays<=0){
            const effectiveFailRate=Math.max(5,rd.failRate-(ceo.rdSuccessBonus||0));
            if(Math.random()*100<effectiveFailRate){
              if(Math.random()<0.5)return{...rd,status:"extended",daysLeft:Math.ceil(rd.totalDays*0.5)};
              return{...rd,status:"failed",daysLeft:0};
            } else {
              INDUSTRY_CATS.forEach(cat=>{
                if(cd.productStats[cat.id])cd.productStats[cat.id].tech=Math.min(100,(cd.productStats[cat.id].tech||0)+rd.techGain);
              });
              return{...rd,status:"success",daysLeft:0};
            }
          }
          return{...rd,daysLeft:newDays};
        });

        // 연예인 AI 자동 섭외
        if(cd.celebs.length===0&&cd.capital>s.maxCapital*0.3&&Math.random()<0.02){
          const tierMap={천재:"톱스타",유능:"중견",평범:"신인",무능:"신인"};
          const celeb=CELEBS.find(c=>c.tier===tierMap[ceo.tier]);
          if(celeb&&cd.capital>=celeb.cost){
            const scandal=Math.random()*100<celeb.scandalRate;
            cd.celebs.push({celebId:celeb.id,daysLeft:celeb.duration,scandal});
            cd.capital-=celeb.cost;
            if(scandal)ceoEvents.push({stock:s,celebScandal:celeb});
          }
        }
        cd.celebs=cd.celebs.filter(c=>{
          c.daysLeft--;
          if(c.scandal)INDUSTRY_CATS.forEach(cat=>{if(cd.productStats[cat.id])cd.productStats[cat.id].ad=Math.max(1,(cd.productStats[cat.id].ad||1)-1);});
          return c.daysLeft>0;
        });

        // 신규 카테고리 개발
        if(cd.newCatDev){
          cd.newCatDev.daysLeft--;
          if(cd.newCatDev.daysLeft<=0){
            if(Math.random()<0.3){cd.newCatDev=null;}
            else{cd.productStats[cd.newCatDev.catId]={tech:30,ad:15,brand:20,price:500000};cd.newCatDev=null;}
          }
        }

        // 유상증자 (자본금 5% 미만)
        if(cd.capital<s.maxCapital*0.05&&Math.random()<0.3){
          ceoEvents.push({stock:s,rights:true});
        }
      });
      return next;
    });
    if(ceoEvents.length>0){
      setTimeout(()=>{
        ceoEvents.forEach(ev=>{
          if(ev.scandal)addLog(`😱 ${ev.stock.name} ${CEOS.find(c=>c.id===ev.ceo?.id)?.name||""} CEO 스캔들!`);
          else if(ev.celebScandal)addLog(`😱 ${ev.stock.name} ${ev.celebScandal.name} 연예인 스캔들!`);
          else if(ev.rights)addLog(`📢 ${ev.stock.name} 유상증자 발표!`);
          else addLog(`👔 ${ev.stock.name} 新CEO: ${ev.ceo.emoji}${ev.ceo.name} (${ev.ceo.tier})`);
        });
      },50);
    }

    // Studying
    if(studying){
      const np=studyProg+1;
      if(np>=EDU_DAYS[studying]){
        setEdu(studying);setStudying(null);setStudyProg(0);
        addLog(`🎓 ${EDU_LBL[studying]} 취득!`);notify(`🎓 졸업!`,"i");
      } else setStudyProg(np);
    }
    setInsiderS(null);

    if(rent>0)addLog(`🏠 임대료 +${fmt(rent)}원`);
    if(income>0)addLog(`💼 급여 +${fmt(income)}원 (세금 -${fmt(tax)}원)`);
    setMoney(m=>m+net);
    // 활동 로그: Day + 이벤트 한 줄
    const todayNewsLog=neMsg?` · ${neMsg}`:"";
    addLog(`📅 Day ${nd}${todayNewsLog}${gdp>75?" 🚀호황":gdp<25?" 💀불황":""}`);
    notify(`📅 Day ${nd}!`,"i");
  };

  const buyA=(id,isSt)=>{
    const q=getQty(id);
    const p=(prices[id]||0)*q;
    if(delisted.includes(id)){notify("상장폐지 종목!","w");return;}
    if(money<p){notify(`💸 ${fmt(p)}원 필요!`,"w");return;}
    setMoney(m=>m-p);setPort(p=>({...p,[id]:(p[id]||0)+q}));
    if(isSt)setBuys(p=>p+1);
    addLog(`📈 ${id} ${q}주 매수 -${fmt(p)}원`);notify(`📈 ${id} ${q}주 매수!`);
  };
  const sellA=(id)=>{
    const q=getQty(id);
    if((port[id]||0)<q){notify("보유 부족!","w");return;}
    const p=(prices[id]||0)*q;
    setMoney(m=>m+p);setPort(p=>({...p,[id]:p[id]-q}));
    addLog(`📉 ${id} ${q}주 매도 +${fmt(p)}원`);notify(`+${fmt(p)}원!`);
  };
  const shortA=(id)=>{
    const q=getQty(id);const p=(prices[id]||0)*q;
    if(money<p*0.5){notify("증거금 부족!","w");return;}
    setShorts(p=>({...p,[id]:{qty:(p[id]?.qty||0)+q,ep:prices[id]}}));
    setMoney(m=>m-p*0.5);
    addLog(`📉 ${id} 공매도 ${q}주`);notify(`공매도 ${q}주!`,"w");
  };
  const coverA=(id)=>{
    const s=shorts[id];if(!s||s.qty===0){notify("공매도 없음!","w");return;}
    const profit=(s.ep-prices[id])*s.qty;
    setMoney(m=>m+prices[id]*s.qty*0.5+profit);
    setShorts(p=>({...p,[id]:{qty:0,ep:0}}));
    notify(`${profit>=0?"✅":""} ${fmt(Math.abs(profit))}원!`,profit>=0?"s":"b");
  };
  const buyProp=(p)=>{
    if(money<p.price){notify("💸 돈 부족!","w");return;}
    if(ownedProps.includes(p.id)){notify("이미 보유!","w");return;}
    setMoney(m=>m-p.price);setOwnedProps(p=>([...p,p.id]));
    notify(`${p.emoji} 구매!`);
  };
  const buyItem=(item)=>{
    if(jailDays>0){notify("감옥에서는 거래 불가!","b");return;}
    if(money<item.buy){notify("💸 돈 부족!","w");return;}
    if(item.special==="insider"){
      // 2% 감옥 확률
      if(Math.random()<0.02){
        const coinSave=coinV();
        const totalNow=ta();
        const seize=Math.floor((totalNow-coinSave)*0.9);
        setMoney(m=>Math.max(0,m-seize));
        setPort(p=>{const n={...p};STOCKS.forEach(s=>{n[s.id]=0;});return n;});
        setOwnedProps([]);
        setJailDays(30);setJailC(c=>c+1);
        setMoney(m=>m-item.buy);
        addLog(`🚨 내부자거래 적발! 자산 ${fmt(seize)}원 몰수! 30일 수감!`);
        notify(`🚨 감옥! 자산 90% 몰수!`,"b");
        return;
      }
      const rs=STOCKS[Math.floor(Math.random()*STOCKS.length)];
      setInsiderS(rs.id);setMoney(m=>m-item.buy);
      notify(`🕵️ ${rs.name} 내일 급등!`,"i");addLog(`🕵️ 내부자정보: ${rs.name} 급등 예정`);return;
    }
    setMoney(m=>m-item.buy);setInv(p=>({...p,[item.id]:(p[item.id]||0)+1}));
    notify(`구매!`);
  };
  const sellItem=(item)=>{
    if(!(inv[item.id]>0)||item.sell===0){notify("판매 불가!","w");return;}
    setMoney(m=>m+item.sell);setInv(p=>({...p,[item.id]:p[item.id]-1}));
    notify(`+${item.sell.toLocaleString()}원!`);
  };
  const selectBasicJob=(jid)=>{
    const j=BASIC_JOBS.find(x=>x.id===jid);if(!j)return;
    setBasicJob(jid);setCompanyId(null);setPositionId(null);
    addLog(`${j.emoji} ${j.name} 취직!`);notify(`${j.emoji} 취직!`,"i");
  };
  const joinCompany=(cid,pid)=>{
    const pos=COMPANY_POSITIONS.find(x=>x.id===pid);if(!pos)return;
    if(EDU_ORD.indexOf(edu)<EDU_ORD.indexOf(pos.edu)){notify(`${EDU_LBL[pos.edu]} 필요!`,"w");return;}
    setCompanyId(cid);setPositionId(pid);setBasicJob(null);
    // Joining bonus: 5 shares
    setPort(p=>({...p,[cid]:(p[cid]||0)+3}));
    addLog(`🏢 ${cid} ${pos.name} 입사! 주식 3주 지급`);notify(`🏢 ${cid} 입사!`,"i");
  };
  const startStudy=(lv)=>{
    if(EDU_ORD.indexOf(edu)>=EDU_ORD.indexOf(lv)){notify("이미 해당 학력!","w");return;}
    if(studying){notify("이미 공부 중!","w");return;}
    const cost=EDU_COST[lv];
    if(money>=cost){
      setMoney(m=>m-cost);
    } else if(loan===0){
      // Auto loan
      setLoan(cost);
      addLog(`📋 등록금 대출 ${fmt(cost)}원 (매일 상환)`);
      notify(`📋 대출로 입학!`,"i");
    } else {notify(`등록금 ${fmt(cost)}원 부족! 대출 먼저 상환하세요.`,"w");return;}
    setStudying(lv);setStudyProg(0);
    addLog(`📚 ${EDU_LBL[lv]} 입학!`);notify(`📚 공부 시작!`,"i");
  };
  const toggleFav=(id)=>{
    setFavorites(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  };
  const buyLotto=()=>{
    if(money<1000){notify("1000원 필요!","w");return;}
    setMoney(m=>m-1000);
    const w=Math.random();
    if(w<0.0001){const prize=Math.floor(Math.random()*5e8)+1e8;setMoney(m=>m+prize);setLottoW(p=>p+1);addLog(`🎰 로또 1등!!! +${fmt(prize)}원`);notify(`🎰 1등!!! +${fmt(prize)}원`,"s");}
    else if(w<0.002){setMoney(m=>m+50000);notify(`🎰 3등 +50,000원!`);}
    else if(w<0.02){setMoney(m=>m+5000);notify(`🎰 5등 +5,000원`);}
    else{notify(`꽝...`,"w");}
  };

  const cur=ta();
  const taDiff=cur-prevTA;
  const mDiff=money-prevMoney;
  const svCur=sv();
  const pvCur=pv();
  // prevTA에서 prev sv/pv 계산 (근사)
  const svDiff=svCur-(prevTA-prevMoney-pvCur);
  const boom=gdp>75,crisis=gdp<25;

  const typeTag=(type)=>{
    const m={defense:<span className="tag tdef">방산주</span>,tech:<span className="tag ttech">기술주</span>,dividend:<span className="tag tdiv">배당주</span>,small:<span className="tag tsmall">소형주</span>};
    return m[type]||null;
  };

  const QtyButtons=({id})=>(
    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {["10","100","1000","all"].map(m=>(
        <button key={m} className={`bqty${qtyMode[id]===m?" active":""}`} onClick={()=>setQtyMode(p=>({...p,[id]:p[id]===m?null:m}))}>
          {m==="all"?"올인":m}
        </button>
      ))}
      {!qtyMode[id]&&<input type="number" min="1" value={qty[id]||1} onChange={e=>setQty(p=>({...p,[id]:e.target.value}))} style={{width:45}}/>}
    </div>
  );

  const currentCompany=companyId?STOCKS.find(s=>s.id===companyId):null;
  const currentPos=positionId?COMPANY_POSITIONS.find(p=>p.id===positionId):null;
  const slideCompany=STOCKS[companySlide];

  const tabs=[
    {id:"home",l:"🏠홈"},{id:"stock",l:"📈주식"},{id:"coin",l:"🪙코인"},
    {id:"work",l:"💼직장"},{id:"prop",l:"🏢부동산"},{id:"mkt",l:"🛒거래"},
    {id:"char",l:"🎨캐릭터"},{id:"edu",l:"🎓학력"},{id:"ach",l:"🏆업적"},
    {id:"industry",l:"📊산업분석"},
  ];

  return<div>
    {notif&&<div className={`notif n${notif.t}`}>{notif.m}</div>}

    {/* JAIL OVERLAY */}
    {jailDays>0&&<div className="jail-overlay">
      <div style={{fontSize:60}}>🔒</div>
      <div style={{fontSize:22,fontWeight:900,color:"#f87171",marginTop:10}}>수감 중</div>
      <div style={{fontSize:15,color:"#aaa",marginTop:8}}>남은 형기: {jailDays}일</div>
      <div style={{fontSize:13,color:"#666",marginTop:6}}>코인 자산은 보호됩니다 🪙</div>

                    {label:`💰 가격점수 (가중치 ${cat.weights.price}%)`,score:priceScore,color:"#43e97b"},
                    {label:`📢 광고력 (가중치 ${cat.weights.ad}%)`,score:p.ad,color:"#f6d365"},
                    {label:`⭐ 브랜드 (가중치 ${cat.weights.brand}%)`,score:p.brand,color:"#f093fb"},
                  ].map(({label,score,color})=>(
                    <div key={label} className="score-bar-wrap">
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#888",marginBottom:1}}>
                        <span>{label}</span>
                        <span style={{color,fontWeight:700}}>{score}점</span>
                      </div>
                      <div className="score-bar-bg">
                        <div className="score-bar-fill" style={{width:`${score}%`,background:color}}></div>
                      </div>
                    </div>
                  ))}
                  {/* 기여 점수 */}
                  <div style={{marginTop:6,background:"rgba(255,215,0,0.06)",borderRadius:6,padding:"4px 6px"}}>
                    <div style={{fontSize:9,color:"#888",marginBottom:2}}>가중 기여점수:</div>
                    {[
                      {label:"기술",score:p.tech,w:cat.weights.tech,color:"#4facfe"},
                      {label:"가격",score:priceScore,w:cat.weights.price,color:"#43e97b"},
                      {label:"광고",score:p.ad,w:cat.weights.ad,color:"#f6d365"},
                      {label:"브랜드",score:p.brand,w:cat.weights.brand,color:"#f093fb"},
                    ].map(({label,score,w,color})=>(
                      <span key={label} style={{fontSize:9,marginRight:6,color}}>
                        {label} {Math.round(score*w/100)}
                      </span>
                    ))}
                  </div>
                </div>
              </div>;
            })}

            {/* 투자 링크 */}
            {isExp&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
              {cat.products.map((p,i)=>{
                const stock=STOCKS.find(s=>s.id===p.company);
                if(!stock)return null;
                return<button key={i} className="btn bbuy" style={{fontSize:10,padding:"4px 10px"}} onClick={()=>{setTab("stock");setDetailStock(p.company);}}>
                  {stock.emoji} {stock.name} 상세보기
                </button>;
              })}
            </div>}
          </div>;
        })}
      </div>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
