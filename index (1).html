function MiniChart({hist,w=180}){
  if(!hist||hist.length<2)return null;
  const max=Math.max(...hist),min=Math.min(...hist),rng=max-min||1;
  const h=30;
  const pts=hist.map((v,i)=>`${(i/(hist.length-1))*w},${h-((v-min)/rng)*h}`).join(" ");
  const last=hist[hist.length-1],prev=hist[hist.length-2];
  return<svg width={w} height={h} style={{display:"block",marginTop:4}}><polyline fill="none" stroke={last>=prev?"#4ade80":"#f87171"} strokeWidth="1.5" points={pts}/></svg>;
}

  const [expandStock,setExpandStock]=useState(null);
  const [month,setMonth]=useState(1);

  const addLog=useCallback(m=>setLog(p=>[m,...p].slice(0,40)),[]);
  const notify=useCallback((m,t="s")=>{setNotif({m,t});setTimeout(()=>setNotif(null),2500);},[]);

  const sv=()=>[...STOCKS,...COINS].reduce((a,s)=>a+(port[s.id]||0)*(prices[s.id]||0),0);
  const pv=()=>ownedProps.reduce((a,pid)=>{const p=PROPS.find(x=>x.id===pid);return a+(p?p.price:0);},0);
  const coinV=()=>COINS.reduce((a,c)=>a+(port[c.id]||0)*(prices[c.id]||0),0);
  const ta=()=>money+sv()+pv();

  // GDP based on top companies revenue trend
  const calcGDP=useCallback((pr,pp)=>{
    const major=["삼전","네이버","카카오","KT"];
    const avg=major.reduce((a,id)=>{
      const cur=pr[id]||1,prev=pp[id]||1;
      return a+(cur-prev)/prev;
    },0)/major.length;
    return Math.min(100,Math.max(0,gdp+avg*30+(Math.random()-0.5)*3));
  },[gdp]);

  useEffect(()=>{
    const cur=ta();
    const g={ta:cur,edu,props:ownedProps.length,buys,lottoW,delistC,jailC};
    ACHS.forEach(a=>{
      if(!achiev.includes(a.id)&&a.cond(g)){
        setAchiev(p=>[...p,a.id]);
        notify(`🏆 업적: ${a.emoji}${a.name}!`,"i");
        addLog(`🏆 업적 달성: ${a.name}`);
      }
    });
    if(cur>=1000000000)setTitle("👑 재벌");
    else if(cur>=100000000)setTitle("💎 억만장자");
    else if(cur>=10000000)setTitle("🏆 부자");
    else if(cur>=1000000)setTitle("💰 백만장자");
    else if(cur>=100000)setTitle("📈 투자자");
    else setTitle("🌱 새싹");
  },[money,ownedProps.length,edu,buys,lottoW,delistC,jailC]);

  const getQty=(id)=>{
    const mode=qtyMode[id];
    if(mode==="10")return 10;
    if(mode==="100")return 100;
    if(mode==="1000")return 1000;
    if(mode==="all")return Math.max(1,Math.floor(money/(prices[id]||1)));
    return parseInt(qty[id]||1);
  };

  const nextDay=()=>{
    if(jailDays>0){
      setJailDays(p=>p-1);
      setDay(d=>d+1);
      setMonth(m=>m===12?1:m+1);
      addLog(`🔒 감옥 수감 중... (${jailDays-1}일 남음)`);
      notify(`🔒 감옥 ${jailDays-1}일 남음`,"b");
      return;
    }

    const nd=day+1;setDay(nd);
    const nm=month===12?1:month+1;setMonth(nm);
    setPrevMoney(money);setPrevTA(ta());

    // News
    let ne=null;
    if(Math.random()<0.38){
      const n=NEWS[Math.floor(Math.random()*NEWS.length)];
      setNewsToday(n);ne=n.e;addLog(`📰 ${n.msg}`);
    } else setNewsToday(null);

    // Update prices
    const newPrices={};
    STOCKS.forEach(s=>{
      if(delisted.includes(s.id)){newPrices[s.id]=prices[s.id];return;}
      let ch=(Math.random()-0.46)*0.1+inflation*0.001;
      if(ne){
        if(ne.type==="all")ch+=(ne.m-1);
        if(ne.type==="sector"&&s.type===ne.sector)ch+=(ne.m-1);
        if(ne.type==="war"&&s.type==="defense")ch+=0.22;
        if(ne.type==="war"&&s.type!=="defense")ch-=0.1;
      }
      if(gdp<25)ch-=0.025;
      if(gdp>75)ch+=0.02;
      if(insiderS===s.id)ch=Math.abs(ch)+0.06;
      ch=Math.max(-0.3,Math.min(0.3,ch));
      newPrices[s.id]=Math.max(10,Math.round(prices[s.id]*(1+ch)));
    });
    COINS.forEach(c=>{
      let ch=(Math.random()-0.44)*c.vol*0.15;
      if(ne?.type==="coin")ch+=(ne.m-1);
      ch=Math.max(-0.4,Math.min(0.4,ch));
      newPrices[c.id]=Math.max(1,Math.round(prices[c.id]*(1+ch)));
    });
    setPrevPrices({...prices});
    setPrices(newPrices);

    setHist(prev=>{
      const next={...prev};
      [...STOCKS,...COINS].forEach(s=>{next[s.id]=[...(prev[s.id]||[]).slice(-29),prices[s.id]];});
      return next;
    });

    // Delisting
    STOCKS.forEach(s=>{
      if(!delisted.includes(s.id)&&prices[s.id]<50&&Math.random()<0.35){
        setDelisted(p=>[...p,s.id]);
        setDelistC(p=>p+1);
        addLog(`💀 ${s.name} 상장폐지!`);
        notify(`💀 ${s.name} 상장폐지!`,"b");
        setPort(p=>({...p,[s.id]:0}));
      }
    });

    // Dividend payout
    STOCKS.filter(s=>s.dividend).forEach(s=>{
      if(nm===s.dividend.month&&(port[s.id]||0)>0){
        const div=Math.round(prices[s.id]*s.dividend.rate*(port[s.id]||0));
        setMoney(m=>m+div);
        addLog(`💸 ${s.name} 배당금 +${fmt(div)}원`);
        notify(`💸 ${s.name} 배당 +${fmt(div)}원!`,"i");
      }
    });

    // Income
    let rent=0;ownedProps.forEach(pid=>{const p=PROPS.find(x=>x.id===pid);if(p)rent+=p.rent;});
    let income=0;
    if(basicJob){const j=BASIC_JOBS.find(x=>x.id===basicJob);if(j)income+=j.pay;}
    if(companyId&&positionId){
      const pos=COMPANY_POSITIONS.find(x=>x.id===positionId);
      const base=companyId==="삼전"?1500:companyId==="네이버"?1300:companyId==="카카오"?1100:companyId==="KT"?900:companyId==="한국전력"?800:companyId==="한화에어"?1600:companyId==="LIG넥스"?1200:companyId==="뿌셔바이오"?600:500;
      if(pos)income+=Math.round(base*pos.payMult);
    }
    const gross=rent+income;
    const taxRate=gross>1000?0.22:gross>500?0.12:0.05;
    const tax=Math.floor(gross*taxRate);
    setTaxTotal(p=>p+tax);
    const net=gross-tax;

    // Loan repayment
    if(loan>0){
      const rep=Math.min(loan,Math.floor(net*0.3)+100);
      setLoan(p=>Math.max(0,p-rep));
    }

    // GDP update based on major stock prices
    setGdp(calcGDP(newPrices,prices));
    setInflation(p=>Math.min(20,Math.max(-2,p+(Math.random()-0.5)*0.5)));

    // Studying
    if(studying){
      const np=studyProg+1;
      if(np>=EDU_DAYS[studying]){
        setEdu(studying);setStudying(null);setStudyProg(0);
        addLog(`🎓 ${EDU_LBL[studying]} 취득!`);notify(`🎓 졸업!`,"i");
      } else setStudyProg(np);
    }
    setInsiderS(null);

    if(rent>0)addLog(`🏠 임대료 +${fmt(rent)}원`);
    if(income>0)addLog(`💼 급여 +${fmt(income)}원 (세금 -${fmt(tax)}원)`);
    setMoney(m=>m+net);
    addLog(`📅 Day ${nd}${gdp>75?" 🚀호황":gdp<25?" 💀불황":""}`);
    notify(`📅 Day ${nd}!`,"i");
  };

  const buyA=(id,isSt)=>{
    const q=getQty(id);
    const p=(prices[id]||0)*q;
    if(delisted.includes(id)){notify("상장폐지 종목!","w");return;}
    if(money<p){notify(`💸 ${fmt(p)}원 필요!`,"w");return;}
    setMoney(m=>m-p);setPort(p=>({...p,[id]:(p[id]||0)+q}));
    if(isSt)setBuys(p=>p+1);
    addLog(`📈 ${id} ${q}주 매수 -${fmt(p)}원`);notify(`📈 ${id} ${q}주 매수!`);
  };
  const sellA=(id)=>{
    const q=getQty(id);
    if((port[id]||0)<q){notify("보유 부족!","w");return;}
    const p=(prices[id]||0)*q;
    setMoney(m=>m+p);setPort(p=>({...p,[id]:p[id]-q}));
    addLog(`📉 ${id} ${q}주 매도 +${fmt(p)}원`);notify(`+${fmt(p)}원!`);
  };
  const shortA=(id)=>{
    const q=getQty(id);const p=(prices[id]||0)*q;
    if(money<p*0.5){notify("증거금 부족!","w");return;}
    setShorts(p=>({...p,[id]:{qty:(p[id]?.qty||0)+q,ep:prices[id]}}));
    setMoney(m=>m-p*0.5);
    addLog(`📉 ${id} 공매도 ${q}주`);notify(`공매도 ${q}주!`,"w");
  };
  const coverA=(id)=>{
    const s=shorts[id];if(!s||s.qty===0){notify("공매도 없음!","w");return;}
    const profit=(s.ep-prices[id])*s.qty;
    setMoney(m=>m+prices[id]*s.qty*0.5+profit);
    setShorts(p=>({...p,[id]:{qty:0,ep:0}}));
    notify(`${profit>=0?"✅":""} ${fmt(Math.abs(profit))}원!`,profit>=0?"s":"b");
  };
  const buyProp=(p)=>{
    if(money<p.price){notify("💸 돈 부족!","w");return;}
    if(ownedProps.includes(p.id)){notify("이미 보유!","w");return;}
    setMoney(m=>m-p.price);setOwnedProps(p=>([...p,p.id]));
    notify(`${p.emoji} 구매!`);
  };
  const buyItem=(item)=>{
    if(jailDays>0){notify("감옥에서는 거래 불가!","b");return;}
    if(money<item.buy){notify("💸 돈 부족!","w");return;}
    if(item.special==="insider"){
      // 2% 감옥 확률
      if(Math.random()<0.02){
        const coinSave=coinV();
        const totalNow=ta();
        const seize=Math.floor((totalNow-coinSave)*0.9);
        setMoney(m=>Math.max(0,m-seize));
        setPort(p=>{const n={...p};STOCKS.forEach(s=>{n[s.id]=0;});return n;});
        setOwnedProps([]);
        setJailDays(30);setJailC(c=>c+1);
        setMoney(m=>m-item.buy);
        addLog(`🚨 내부자거래 적발! 자산 ${fmt(seize)}원 몰수! 30일 수감!`);
        notify(`🚨 감옥! 자산 90% 몰수!`,"b");
        return;
      }
      const rs=STOCKS[Math.floor(Math.random()*STOCKS.length)];
      setInsiderS(rs.id);setMoney(m=>m-item.buy);
      notify(`🕵️ ${rs.name} 내일 급등!`,"i");addLog(`🕵️ 내부자정보: ${rs.name} 급등 예정`);return;
    }
    setMoney(m=>m-item.buy);setInv(p=>({...p,[item.id]:(p[item.id]||0)+1}));
    notify(`구매!`);
  };
  const sellItem=(item)=>{
    if(!(inv[item.id]>0)||item.sell===0){notify("판매 불가!","w");return;}
    setMoney(m=>m+item.sell);setInv(p=>({...p,[item.id]:p[item.id]-1}));
    notify(`+${item.sell.toLocaleString()}원!`);
  };
  const selectBasicJob=(jid)=>{
    const j=BASIC_JOBS.find(x=>x.id===jid);if(!j)return;
    setBasicJob(jid);setCompanyId(null);setPositionId(null);
    addLog(`${j.emoji} ${j.name} 취직!`);notify(`${j.emoji} 취직!`,"i");
  };
  const joinCompany=(cid,pid)=>{
    const pos=COMPANY_POSITIONS.find(x=>x.id===pid);if(!pos)return;
    if(EDU_ORD.indexOf(edu)<EDU_ORD.indexOf(pos.edu)){notify(`${EDU_LBL[pos.edu]} 필요!`,"w");return;}
    setCompanyId(cid);setPositionId(pid);setBasicJob(null);
    // Joining bonus: 5 shares
    setPort(p=>({...p,[cid]:(p[cid]||0)+3}));
    addLog(`🏢 ${cid} ${pos.name} 입사! 주식 3주 지급`);notify(`🏢 ${cid} 입사!`,"i");
  };
  const startStudy=(lv)=>{
    if(EDU_ORD.indexOf(edu)>=EDU_ORD.indexOf(lv)){notify("이미 해당 학력!","w");return;}
    if(studying){notify("이미 공부 중!","w");return;}
    const cost=EDU_COST[lv];
    if(money>=cost){
      setMoney(m=>m-cost);
    } else if(loan===0){
      // Auto loan
      setLoan(cost);
      addLog(`📋 등록금 대출 ${fmt(cost)}원 (매일 상환)`);
      notify(`📋 대출로 입학!`,"i");
    } else {notify(`등록금 ${fmt(cost)}원 부족! 대출 먼저 상환하세요.`,"w");return;}
    setStudying(lv);setStudyProg(0);
    addLog(`📚 ${EDU_LBL[lv]} 입학!`);notify(`📚 공부 시작!`,"i");
  };
  const toggleFav=(id)=>{
    setFavorites(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  };
  const buyLotto=()=>{
    if(money<1000){notify("1000원 필요!","w");return;}
    setMoney(m=>m-1000);
    const w=Math.random();
    if(w<0.0001){const prize=Math.floor(Math.random()*5e8)+1e8;setMoney(m=>m+prize);setLottoW(p=>p+1);addLog(`🎰 로또 1등!!! +${fmt(prize)}원`);notify(`🎰 1등!!! +${fmt(prize)}원`,"s");}
    else if(w<0.002){setMoney(m=>m+50000);notify(`🎰 3등 +50,000원!`);}
    else if(w<0.02){setMoney(m=>m+5000);notify(`🎰 5등 +5,000원`);}
    else{notify(`꽝...`,"w");}
  };

  const cur=ta();
  const taDiff=cur-prevTA;
  const mDiff=money-prevMoney;
  const boom=gdp>75,crisis=gdp<25;

  const typeTag=(type)=>{
    const m={defense:<span className="tag tdef">방산주</span>,tech:<span className="tag ttech">기술주</span>,dividend:<span className="tag tdiv">배당주</span>,small:<span className="tag tsmall">소형주</span>};
    return m[type]||null;
  };

  const QtyButtons=({id})=>(
    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      {["10","100","1000","all"].map(m=>(
        <button key={m} className={`bqty${qtyMode[id]===m?" active":""}`} onClick={()=>setQtyMode(p=>({...p,[id]:p[id]===m?null:m}))}>
          {m==="all"?"올인":m}
        </button>
      ))}
      {!qtyMode[id]&&<input type="number" min="1" value={qty[id]||1} onChange={e=>setQty(p=>({...p,[id]:e.target.value}))} style={{width:45}}/>}
    </div>
  );

  const currentCompany=companyId?STOCKS.find(s=>s.id===companyId):null;
  const currentPos=positionId?COMPANY_POSITIONS.find(p=>p.id===positionId):null;
  const slideCompany=STOCKS[companySlide];

  const tabs=[
    {id:"home",l:"🏠홈"},{id:"stock",l:"📈주식"},{id:"coin",l:"🪙코인"},
    {id:"work",l:"💼직장"},{id:"prop",l:"🏢부동산"},{id:"mkt",l:"🛒거래"},
    {id:"char",l:"🎨캐릭터"},{id:"edu",l:"🎓학력"},{id:"ach",l:"🏆업적"},
  ];

  return<div>
    {notif&&<div className={`notif n${notif.t}`}>{notif.m}</div>}

    {/* JAIL OVERLAY */}
    {jailDays>0&&<div className="jail-overlay">
      <div style={{fontSize:60}}>🔒</div>
      <div style={{fontSize:22,fontWeight:900,color:"#f87171",marginTop:10}}>수감 중</div>
      <div style={{fontSize:15,color:"#aaa",marginTop:8}}>남은 형기: {jailDays}일</div>
      <div style={{fontSize:13,color:"#666",marginTop:6}}>코인 자산은 보호됩니다 🪙</div>
      <button className="bnext" style={{marginTop:20,width:"auto",padding:"10px 30px"}} onClick={nextDay}>하루 보내기</button>
    </div>}

    <div className="wrap">
      {/* HEADER */}
      <div className="hcard">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:"#aaa"}}>{title}</div>
            <div style={{fontWeight:900,fontSize:24,color:"#ffd700"}}>뿌셔뿌셔</div>
            <div style={{fontSize:11,color:"#666"}}>{charName} · Day {day} · {month}월</div>
          </div>
          <Avatar face={FACES[face]} top={TOPS[top]} bot={BOTS[bot]} shoes={SHOES_L[shoes]} acc={ACCS_L[acc]}/>
        </div>
        {/* Asset rows - icon + number side by side */}
        <div style={{marginTop:8,background:"rgba(255,215,0,0.06)",borderRadius:12,border:"1px solid rgba(255,215,0,0.18)",padding:"10px 14px"}}>
          {[
            {icon:"💰",label:"현금",val:fmt(money),diff:mDiff},
            {icon:"📈",label:"주식/코인",val:fmt(sv()),diff:null},
            {icon:"🏢",label:"부동산",val:fmt(pv()),diff:null},
            {icon:"🏆",label:"총자산",val:fmt(cur),diff:taDiff},
          ].map(({icon,label,val,diff})=>(
            <div key={label} className="asset-row">
              <span style={{fontSize:20,minWidth:28}}>{icon}</span>
              <span style={{fontSize:12,color:"#888",minWidth:60}}>{label}</span>
              <span style={{fontWeight:800,fontSize:15,flex:1}}>{val}원</span>
              {diff!==null&&<span style={{fontSize:11}} className={diff>=0?"up":"dn"}>{diff>=0?"▲":"▼"}{fmt(Math.abs(diff))}</span>}
            </div>
          ))}
        </div>
        {boom&&<div style={{marginTop:6,background:"rgba(100,255,150,0.08)",border:"1px solid rgba(100,255,150,0.3)",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#4ade80",textAlign:"center"}}>🚀 경기 호황!</div>}
        {crisis&&<div style={{marginTop:6,background:"rgba(255,100,100,0.08)",border:"1px solid rgba(255,100,100,0.3)",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#f87171",textAlign:"center"}}>💀 경기 불황!</div>}
        {newsToday&&<div className="news" style={{marginTop:8}}>{newsToday.msg}</div>}
        {loan>0&&<div style={{marginTop:6,background:"rgba(255,80,80,0.08)",border:"1px solid rgba(255,80,80,0.3)",borderRadius:8,padding:"3px 10px",fontSize:11,color:"#f87171",textAlign:"center"}}>📋 대출 잔액: {fmt(loan)}원</div>}
        <button className="bnext" style={{marginTop:10}} onClick={nextDay}>⏭ 다음 날 (Day {day+1})</button>
      </div>

      {/* TABS */}
      <div className="tabs">{tabs.map(t=><button key={t.id} className={`tab ${tab===t.id?"on":"off"}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}</div>

      {/* HOME */}
      {tab==="home"&&<div>
        {/* Favorites */}
        {favorites.length>0&&<div className="card cgold">
          <div style={{fontWeight:800,marginBottom:8}}>⭐ 즐겨찾기</div>
          {favorites.map(id=>{
            const s=STOCKS.find(x=>x.id===id)||COINS.find(x=>x.id===id)||PROPS.find(x=>x.id===id);
            if(!s)return null;
            const isProp=PROPS.find(x=>x.id===id);
            if(isProp){
              const owned=ownedProps.includes(id);
              return<div key={id} className="fav-mini">
                <span>{s.emoji} {s.name}</span>
                <span style={{color:owned?"#4ade80":"#888"}}>{owned?"소유중":"미보유"}</span>
              </div>;
            }
            const pr=prices[id]||0,pp=prevPrices[id]||pr;
            const ch=((pr-pp)/pp*100).toFixed(1);
            const isUp=pr>=pp;
            return<div key={id} className="fav-mini">
              <span>{s.emoji} {s.name}</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:800}}>{fmt(pr)}원</div>
                <div style={{fontSize:10}} className={isUp?"up":"dn"}>{isUp?"▲":"▼"}{Math.abs(ch)}%</div>
              </div>
            </div>;
          })}
        </div>}

        <div className="card">
          <div style={{fontWeight:800,marginBottom:6}}>🌍 경제 지표</div>
          <div style={{fontSize:11,color:"#888",marginBottom:4}}>
            경기지수 {Math.round(gdp)}/100 (주요기업 주가 연동) | 물가 {inflation.toFixed(1)}%
          </div>
          <div className="prog"><div className="progf" style={{width:`${gdp}%`,background:gdp>60?"linear-gradient(90deg,#43e97b,#38f9d7)":gdp<30?"linear-gradient(90deg,#f5576c,#f093fb)":"linear-gradient(90deg,#f6d365,#fda085)"}}></div></div>
          <div style={{fontSize:10,color:"#555",marginTop:4}}>삼성전자, 네이버, 카카오, KT 주가 기반 산출</div>
        </div>

        <div className="card">
          <div style={{fontWeight:800,marginBottom:6}}>📜 활동 로그</div>
          {log.slice(0,10).map((l,i)=><div key={i} style={{fontSize:11,color:"#999",borderBottom:"1px solid rgba(255,255,255,0.04)",padding:"3px 0"}}>{l}</div>)}
        </div>
      </div>}

      {/* STOCK */}
      {tab==="stock"&&<div>
        <div className="card" style={{padding:"10px 14px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:4}}>📊 섹터 등락</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {["defense","tech","dividend","small"].map(type=>{
              const ss=STOCKS.filter(s=>s.type===type&&!delisted.includes(s.id));
              const avg=ss.length?ss.reduce((a,s)=>{const pp=prevPrices[s.id]||prices[s.id];return a+(prices[s.id]-pp)/pp;},0)/ss.length*100:0;
              return<div key={type} style={{fontSize:11}}>{typeTag(type)}<span className={avg>=0?"up":"dn"}> {avg>=0?"▲":"▼"}{Math.abs(avg).toFixed(1)}%</span></div>;
            })}
          </div>
        </div>
        {STOCKS.map(s=>{
          const pr=prices[s.id]||0,pp=prevPrices[s.id]||pr;
          const ch=((pr-pp)/pp*100).toFixed(1);
          const isUp=pr>=pp,held=port[s.id]||0;
          const isDel=delisted.includes(s.id),isIns=insiderS===s.id;
          const limitUp=Math.abs(parseFloat(ch))>=29;
          const isFav=favorites.includes(s.id);
          const isExpanded=expandStock===s.id;
          return<div className="card" key={s.id} style={{opacity:isDel?0.45:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:3,flexWrap:"wrap"}}>
                  <button className="fav-btn" onClick={()=>toggleFav(s.id)}>{isFav?"⭐":"☆"}</button>
                  <span style={{fontSize:15}}>{s.emoji}</span>
                  <span style={{fontWeight:800,fontSize:13}}>{s.name}</span>
                  {typeTag(s.type)}
                  {isDel&&<span className="tag tdel">상폐</span>}
                  {isIns&&<span style={{fontSize:10,color:"#ffd700"}}>🕵️</span>}
                  {limitUp&&!isDel&&<span style={{fontSize:10,color:isUp?"#4ade80":"#f87171"}}>{isUp?"📈상한가":"📉하한가"}</span>}
                </div>
              </div>
              <div style={{textAlign:"right",minWidth:85}}>
                <div style={{fontWeight:900,fontSize:14,color:isUp?"#4ade80":"#f87171"}}>{fmt(pr)}원</div>
                <div style={{fontSize:10}} className={isUp?"up":"dn"}>{isUp?"▲":"▼"}{Math.abs(ch)}%</div>
                <div style={{fontSize:10,color:"#555"}}>보유 {held}주</div>
              </div>
            </div>
            {/* Basic info always visible */}
            <div style={{fontSize:10,color:"#555",marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
              <span>시총 {fmt(pr*s.shares/1000)}억</span>
              <span>매출 {fmt(s.revenue/10000)}억</span>
              <span>영업익 {fmt(s.profit/10000)}억</span>
              {s.dividend&&<span style={{color:"#88ffaa"}}>💸배당 {s.dividend.month}월 ({(s.dividend.rate*100).toFixed(0)}%)</span>}
            </div>
            {/* Expandable detail */}
            <button style={{background:"none",border:"none",color:"#888",fontSize:10,cursor:"pointer",padding:"2px 0",fontFamily:"'Noto Sans KR',sans-serif"}} onClick={()=>setExpandStock(isExpanded?null:s.id)}>
              {isExpanded?"▲ 접기":"▼ 기업 상세"}
            </button>
            {isExpanded&&<div style={{marginTop:6,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px"}}>
              <div className="detail-row"><span style={{color:"#888"}}>창립일</span><span>{s.founded}</span></div>
              <div className="detail-row"><span style={{color:"#888"}}>임직원</span><span>{s.employees}</span></div>
              <div className="detail-row"><span style={{color:"#888"}}>발행주식</span><span>{s.shares.toLocaleString()}만주</span></div>
              <div className="detail-row"><span style={{color:"#888"}}>매출액</span><span>{fmt(s.revenue/10000)}억원</span></div>
              <div className="detail-row"><span style={{color:"#888"}}>영업이익</span><span style={{color:s.profit>=0?"#4ade80":"#f87171"}}>{fmt(s.profit/10000)}억원</span></div>
              <div className="detail-row"><span style={{color:"#888"}}>시가총액</span><span>{fmt(pr*s.shares/1000)}억원</span></div>
              {s.dividend&&<div className="detail-row"><span style={{color:"#888"}}>배당</span><span style={{color:"#88ffaa"}}>{s.dividend.month}월 / 주당 {fmt(pr*s.dividend.rate)}원</span></div>}
            </div>}
            <MiniChart hist={[...hist[s.id]||[],pr]} w={200}/>
            {!isDel&&<div style={{marginTop:6}}>
              <QtyButtons id={s.id}/>
              <div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}>
                <button className="btn bbuy" onClick={()=>buyA(s.id,true)}>매수</button>
                <button className="btn bsell" onClick={()=>sellA(s.id)}>매도</button>
                <button className="btn bshort" onClick={()=>shortA(s.id)}>공매도</button>
                {shorts[s.id]?.qty>0&&<button className="btn" style={{background:"#555",color:"#fff",fontSize:10,padding:"4px 8px"}} onClick={()=>coverA(s.id)}>청산</button>}
                <span style={{fontSize:10,color:"#555",alignSelf:"center",marginLeft:"auto"}}>{fmt(getQty(s.id)*(prices[s.id]||0))}원</span>
              </div>
            </div>}
            {shorts[s.id]?.qty>0&&<div style={{fontSize:10,color:"#f093fb",marginTop:3}}>공매도 {shorts[s.id].qty}주 @ {fmt(shorts[s.id].ep)}원</div>}
          </div>;
        })}
      </div>}

      {/* COIN */}
      {tab==="coin"&&<div>
        <div className="card" style={{padding:"10px 14px"}}>
          <div style={{fontSize:12,color:"#aaa"}}>🪙 코인은 변동성이 높아요! 감옥 가도 코인 자산은 보호돼요 🛡️</div>
        </div>
        {COINS.map(c=>{
          const pr=prices[c.id]||0,pp=prevPrices[c.id]||pr;
          const ch=((pr-pp)/pp*100).toFixed(1);
          const isUp=pr>=pp,held=port[c.id]||0;
          const isFav=favorites.includes(c.id);
          return<div className="card" key={c.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <button className="fav-btn" onClick={()=>toggleFav(c.id)}>{isFav?"⭐":"☆"}</button>
                <span style={{fontSize:18}}>{c.emoji}</span>
                <span style={{fontWeight:800,fontSize:14,marginLeft:5}}>{c.name}</span>
                <span className="tag tcoin" style={{marginLeft:4}}>코인</span>
                <div style={{fontSize:10,color:"#555",marginTop:2}}>변동성 {'⚡'.repeat(Math.round(c.vol/0.1))}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:900,fontSize:14,color:isUp?"#4ade80":"#f87171"}}>{fmt(pr)}원</div>
                <div style={{fontSize:10}} className={isUp?"up":"dn"}>{isUp?"▲":"▼"}{Math.abs(ch)}%</div>
                <div style={{fontSize:10,color:"#555"}}>보유 {held}개</div>
              </div>
            </div>
            <MiniChart hist={[...hist[c.id]||[],pr]} w={200}/>
            <div style={{marginTop:6}}>
              <QtyButtons id={c.id}/>
              <div style={{display:"flex",gap:4,marginTop:5}}>
                <button className="btn bbuy" onClick={()=>buyA(c.id,false)}>구매</button>
                <button className="btn bsell" onClick={()=>sellA(c.id)}>판매</button>
                <span style={{fontSize:10,color:"#555",alignSelf:"center",marginLeft:"auto"}}>{fmt(getQty(c.id)*(prices[c.id]||0))}원</span>
              </div>
            </div>
          </div>;
        })}
        <div className="card cgold">
          <div style={{fontWeight:800,marginBottom:6}}>🎰 로또</div>
          <div style={{fontSize:11,color:"#888",marginBottom:8}}>1장 1,000원 | 1등 확률 0.01%</div>
          <button className="btn blotto" onClick={buyLotto}>🎰 로또 구매 (-1,000원)</button>
        </div>
      </div>}

      {/* WORK - 직장 */}
      {tab==="work"&&<div>
        <div className="card" style={{padding:"10px 14px"}}>
          <div style={{fontSize:13}}>현재 직장: <span style={{fontWeight:700,color:"#ffd700"}}>
            {companyId&&currentPos?`${companyId} ${currentPos.name}`:basicJob?BASIC_JOBS.find(x=>x.id===basicJob)?.name:"없음"}
          </span></div>
          <div style={{fontSize:11,color:"#888"}}>학력: {EDU_LBL[edu]}{studying?` | 공부중 (${studyProg}/${EDU_DAYS[studying]}일)`:""}</div>
        </div>

        {/* Basic jobs */}
        <div style={{fontWeight:700,fontSize:13,color:"#ffd700",marginBottom:6}}>기본 알바</div>
        {BASIC_JOBS.map(j=>{
          const sel=basicJob===j.id&&!companyId;
          return<div className="card" key={j.id} style={{border:sel?"1px solid #ffd700":"1px solid rgba(255,200,50,0.18)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontSize:16}}>{j.emoji}</span>
                <span style={{fontWeight:700,fontSize:13,marginLeft:6}}>{j.name}</span>
                <div style={{fontSize:10,color:"#888",marginTop:2}}>💰 +{j.pay.toLocaleString()}원/일 (세전)</div>
              </div>
              <button className="btn bwork" onClick={()=>selectBasicJob(j.id)}>{sel?"현직장✓":"취직"}</button>
            </div>
          </div>;
        })}

        {/* Company slider */}
        <div style={{fontWeight:700,fontSize:13,color:"#ffd700",margin:"12px 0 8px"}}>🏢 기업 취업</div>
        <div className="card">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <button className="btn" style={{background:"rgba(255,255,255,0.1)",color:"#fff",padding:"6px 12px"}}
              onClick={()=>setCompanySlide(p=>(p-1+STOCKS.length)%STOCKS.length)}>◀</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontWeight:800,fontSize:16}}>{slideCompany?.emoji} {slideCompany?.name}</div>
              <div style={{fontSize:11,color:"#888"}}>{typeTag(slideCompany?.type)} {slideCompany?.employees}</div>
              <div style={{fontSize:11,color:"#888"}}>매출 {fmt((slideCompany?.revenue||0)/10000)}억 | 주가 {fmt(prices[slideCompany?.id]||0)}원</div>
            </div>
            <button className="btn" style={{background:"rgba(255,255,255,0.1)",color:"#fff",padding:"6px 12px"}}
              onClick={()=>setCompanySlide(p=>(p+1)%STOCKS.length)}>▶</button>
          </div>
          <div style={{fontSize:11,color:"#888",marginBottom:6}}>직급 선택:</div>
          <div style={{display:"flex",flex:"wrap",gap:5,flexWrap:"wrap"}}>
            {COMPANY_POSITIONS.map(pos=>{
              const can=EDU_ORD.indexOf(edu)>=EDU_ORD.indexOf(pos.edu);
              const isCur=companyId===slideCompany?.id&&positionId===pos.id;
              const base=slideCompany?.id==="삼전"?1500:slideCompany?.id==="네이버"?1300:slideCompany?.id==="카카오"?1100:slideCompany?.id==="KT"?900:slideCompany?.id==="한국전력"?800:slideCompany?.id==="한화에어"?1600:slideCompany?.id==="LIG넥스"?1200:slideCompany?.id==="뿌셔바이오"?600:500;
              const pay=Math.round(base*pos.payMult);
              return<button key={pos.id} className="btn" style={{
                background:isCur?"linear-gradient(135deg,#f6d365,#fda085)":can?"rgba(255,255,255,0.1)":"rgba(100,100,100,0.2)",
                color:isCur?"#000":can?"#fff":"#555",
                opacity:can?1:0.5,
                fontSize:11,padding:"6px 10px"
              }} onClick={()=>can&&slideCompany&&joinCompany(slideCompany.id,pos.id)}>
                {pos.name}<br/><span style={{fontSize:9}}>{can?`+${fmt(pay)}원`:`🔒${EDU_LBL[pos.edu]}`}</span>
              </button>;
            })}
          </div>
        </div>
      </div>}

      {/* PROPERTY */}
      {tab==="prop"&&<div>
        {PROPS.map(p=>{
          const owned=ownedProps.includes(p.id);
          const isFav=favorites.includes(p.id);
          return<div className="card" key={p.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <button className="fav-btn" onClick={()=>toggleFav(p.id)}>{isFav?"⭐":"☆"}</button>
                <span style={{fontSize:20}}>{p.emoji}</span>
                <span style={{fontWeight:700,fontSize:13,marginLeft:6}}>{p.name}</span>
                {owned&&<span style={{marginLeft:6,fontSize:10,color:"#4ade80",fontWeight:700}}>소유중</span>}
                <div style={{fontSize:11,color:"#888",marginTop:2}}>
                  💰 {fmt(p.price)}원 | 📅 +{fmt(p.rent)}원/일
                </div>
              </div>
              <button className="btn bbuy" style={{opacity:owned?0.3:1}} onClick={()=>buyProp(p)}>{owned?"보유":"구매"}</button>
            </div>
          </div>;
        })}
      </div>}

      {/* MARKET */}
      {tab==="mkt"&&<div>
        {ITEMS.map(item=>{
          const held=inv[item.id]||0;
          return<div className="card" key={item.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontWeight:700,fontSize:14}}>{item.name}</span>
                {item.special==="insider"&&<div style={{fontSize:10,color:"#f87171",marginTop:2}}>⚠️ 구매시 2% 확률 감옥 (자산 90% 몰수 + 30일 수감)</div>}
                {item.special==="insider"&&<div style={{fontSize:10,color:"#88ffaa"}}>🪙 코인 자산은 보호됨</div>}
                <div style={{fontSize:11,color:"#888",marginTop:2}}>
                  구매 {fmt(item.buy)}원
                  {item.sell>0&&<> → 판매 {fmt(item.sell)}원 <span className="up">+{item.sell-item.buy}</span></>}
                </div>
                <div style={{fontSize:10,color:"#666"}}>보유 {held}개</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button className="btn bbuy" onClick={()=>buyItem(item)}>구매</button>
                {item.sell>0&&<button className="btn bsell" onClick={()=>sellItem(item)}>판매</button>}
              </div>
            </div>
          </div>;
        })}
      </div>}

      {/* CHAR */}
      {tab==="char"&&<div>
        <div className="card cgold" style={{textAlign:"center"}}>
          <Avatar face={FACES[face]} top={TOPS[top]} bot={BOTS[bot]} shoes={SHOES_L[shoes]} acc={ACCS_L[acc]}/>
          <div style={{marginTop:8}}><input type="text" value={charName} onChange={e=>setCharName(e.target.value)} style={{width:120,textAlign:"center",fontWeight:700}}/></div>
          <div style={{fontSize:11,color:"#888",marginTop:4}}>{title} · {EDU_LBL[edu]}</div>
        </div>
        {[
          {lbl:"얼굴",arr:FACES,v:face,s:setFace},
          {lbl:"상의",arr:TOPS,v:top,s:setTop},
          {lbl:"하의",arr:BOTS,v:bot,s:setBot},
          {lbl:"신발",arr:SHOES_L,v:shoes,s:setShoes},
          {lbl:"악세서리",arr:ACCS_L,v:acc,s:setAcc},
        ].map(({lbl,arr,v,s})=><div className="card" key={lbl}>
          <div style={{fontWeight:700,marginBottom:5}}>{lbl}</div>
          <div style={{display:"flex",flexWrap:"wrap"}}>
            {arr.map((item,i)=><div key={i} className={`char-opt${v===i?" sel":""}`} onClick={()=>s(i)}>{item||"없음"}</div>)}
          </div>
        </div>)}
      </div>}

      {/* EDU */}
      {tab==="edu"&&<div>
        <div className="card cgold">
          <div style={{fontWeight:800,marginBottom:4}}>🎓 현재 학력: <span style={{color:"#ffd700"}}>{EDU_LBL[edu]}</span></div>
          {loan>0&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>📋 대출 잔액: {fmt(loan)}원 (매일 자동 상환)</div>}
          {studying&&<div style={{marginTop:6}}>
            <div style={{fontSize:11,color:"#aaa"}}>📚 {EDU_LBL[studying]} ({studyProg}/{EDU_DAYS[studying]}일)</div>
            <div className="prog"><div className="progf" style={{width:`${studyProg/EDU_DAYS[studying]*100}%`,background:"linear-gradient(90deg,#f6d365,#fda085)"}}></div></div>
          </div>}
        </div>
        {["highschool","college","grad"].map(lv=>{
          const done=EDU_ORD.indexOf(edu)>=EDU_ORD.indexOf(lv);
          const isStud=studying===lv;
          const cost=EDU_COST[lv];
          const canAfford=money>=cost;
          return<div className="card" key={lv}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{EDU_LBL[lv]}</div>
                <div style={{fontSize:11,color:"#888"}}>등록금 {fmt(cost)}원 | {EDU_DAYS[lv]}일 소요</div>
                <div style={{fontSize:10,color:"#666"}}>
                  {lv==="highschool"&&"→ 사무직/대리 취업"}
                  {lv==="college"&&"→ 과장/부장/상장기업 취업"}
                  {lv==="grad"&&"→ 임원/한화에어로 취업"}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <button className="btn bedu" style={{opacity:done||isStud?0.35:1}} onClick={()=>!done&&!studying&&startStudy(lv)}>
                  {done?"졸업✓":isStud?"공부중...":"등록"}
                </button>
                {!done&&!isStud&&!canAfford&&loan===0&&(
                  <button className="btn bloan" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>startStudy(lv)}>
                    대출입학
                  </button>
                )}
              </div>
            </div>
          </div>;
        })}
      </div>}

      {/* ACHIEVEMENTS */}
      {tab==="ach"&&<div>
        <div className="card cgold">
          <div style={{fontWeight:800,marginBottom:6}}>🏆 업적 & 칭호</div>
          <div style={{fontSize:13,marginBottom:10}}>현재 칭호: <span style={{color:"#ffd700",fontWeight:700}}>{title}</span></div>
          {ACHS.map(a=>{
            const done=achiev.includes(a.id);
            return<div key={a.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",opacity:done?1:0.35}}>
              <span style={{fontSize:18}}>{a.emoji}</span>
              <div><div style={{fontWeight:700,fontSize:12}}>{a.name}</div><div style={{fontSize:10,color:"#888"}}>{a.desc}</div></div>
              {done&&<span style={{marginLeft:"auto",color:"#ffd700",fontSize:11}}>✓달성</span>}
            </div>;
          })}
        </div>
        <div className="card">
          <div style={{fontWeight:800,marginBottom:6}}>📊 통계</div>
          {[
            ["총 주식 매수",`${buys}회`],["상장폐지",`${delistC}회`],["로또 당첨",`${lottoW}회`],
            ["감옥 경험",`${jailC}회`],["납부 세금",`${fmt(taxTotal)}원`],
            ["대출 잔액",`${fmt(loan)}원`],["보유 부동산",`${ownedProps.length}개`],
            ["업적",`${achiev.length}/${ACHS.length}개`],
          ].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span style={{color:"#888"}}>{k}</span><span style={{fontWeight:700}}>{v}</span>
          </div>)}
        </div>
      </div>}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
